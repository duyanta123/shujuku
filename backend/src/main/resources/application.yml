spring:
  application:
    name: lab-course-system

  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lab_course_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-this-is-unsafe}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/lab-course-system.log}
    max-size: 10MB
    max-history: 30
  level:
    root: WARN
    com.labcourse: INFO
    com.labcourse.service.impl.AttendanceServiceImpl: DEBUG
    com.labcourse.controller.AttendanceController: DEBUG
    com.labcourse.filter.JwtFilter: INFO
    com.labcourse.config.GlobalExceptionHandler: DEBUG
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.orm.jpa: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
