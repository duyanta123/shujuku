name: Attendance Check-in CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'bff/**'
      - 'frontend/**'
      - 'database/**'
      - '.github/workflows/attendance-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'bff/**'
      - 'frontend/**'
      - 'database/**'
      - '.github/workflows/attendance-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: lab_course_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Initialize database
        run: mysql -h 127.0.0.1 -u root -p123456 lab_course_system < database/init_database.sql

      - name: Run backend tests
        run: mvn -B verify -f backend/pom.xml
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/lab_course_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
          DB_USERNAME: root
          DB_PASSWORD: 123456

      - name: Publish JUnit test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Backend Test Results
          path: 'backend/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

  bff-tests:
    name: BFF Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bff

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run BFF tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --registry=https://registry.npmjs.org

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --registry=https://registry.npmjs.org

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-tests, bff-tests, frontend-tests]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Attendance CI Failure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Jobs" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-tests.result }}" = "failure" ]; then
            echo "- Backend Tests" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.bff-tests.result }}" = "failure" ]; then
            echo "- BFF Tests" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.frontend-tests.result }}" = "failure" ]; then
            echo "- Frontend Tests" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [test reports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
