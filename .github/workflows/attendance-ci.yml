name: Attendance Check-in CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/**'
      - '.github/workflows/attendance-ci.yml'
      - 'database/init_database.sql'
  pull_request:
    branches: [main]
    paths:
      - 'backend/src/**'
      - '.github/workflows/attendance-ci.yml'
      - 'database/init_database.sql'
  workflow_dispatch:

jobs:
  backend-unit-tests:
    name: Backend JUnit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: lab_course_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -u root -p123456 lab_course_system < database/init_database.sql

      - name: Run JUnit tests
        run: mvn -B verify -f backend/pom.xml
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/lab_course_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
          DB_USERNAME: root
          DB_PASSWORD: 123456

      - name: Publish JUnit test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JUnit Test Results
          path: 'backend/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-reports
          path: backend/target/surefire-reports/

  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: lab_course_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -u root -p123456 < database/init_database.sql

      - name: Build and run integration tests
        run: mvn -B verify -f backend/pom.xml
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/lab_course_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
          DB_USERNAME: root
          DB_PASSWORD: 123456

      - name: Publish integration test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Integration Test Results
          path: 'backend/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: backend/target/surefire-reports/

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, api-integration-tests]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Attendance CI Failure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Jobs" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-unit-tests.result }}" = "failure" ]; then
            echo "- Backend JUnit Tests" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.api-integration-tests.result }}" = "failure" ]; then
            echo "- API Integration Tests" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [test reports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY